<!doctype html>
<html lang="en">
  <head>
    <!-- SPA on GitHub Pages: decode the path preserved by 404.html, then rewrite
         any legacy #/… hash link to the clean path. Both run before the app so
         BrowserRouter sees the correct path. https://github.com/rafgraph/spa-github-pages -->
    <script type="text/javascript">
      // 1) Decode the path that 404.html encoded into `/?/…`.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location);
      // 2) Back-compat: rewrite a legacy HashRouter URL (#/path) to a clean path.
      (function (l) {
        if (l.hash.indexOf('#/') === 0) {
          window.history.replaceState(null, null, l.pathname.replace(/\/$/, '') + l.hash.slice(1))
        }
      })(window.location);
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#ffffff" />
    <title>Lucas Kim · Spatial ML Engineer</title>
    <meta
      name="description"
      content="Spatial machine learning, engineered into production pipelines. Lucas Kim designs and trains models on spatial and geometric data, and knows where ML fits versus a rule-based approach."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lucas Kim · Spatial ML Engineer" />
    <meta
      property="og:description"
      content="Spatial machine learning, engineered into production pipelines. The judgment of where ML fits versus a rule-based approach. MS Computer Science. GNN and spatial ML background."
    />
    <meta property="og:url" content="https://ichbinlucaskim.github.io/" />

    <!-- On Apple devices the OS San Francisco font is used (see CSS stack);
         Inter is loaded as a close cross-platform fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

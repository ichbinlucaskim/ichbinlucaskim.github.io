<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lucas Kim · Spatial ML Engineer</title>
    <!-- SPA fallback for GitHub Pages: encode the requested path into a query and
         redirect to index.html, which decodes it back to the clean path.
         User/organization site served at root => pathSegmentsToKeep = 0.
         https://github.com/rafgraph/spa-github-pages -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
